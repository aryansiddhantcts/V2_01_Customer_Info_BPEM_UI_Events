
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Utilities Exception</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 28px 32px;
      width: 100%;
    }

    h2 { font-size: 16px; font-weight: 600; color: #111; margin-bottom: 20px; }

    /* ── Section ── */
    .section { margin-bottom: 16px; }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; cursor: pointer; user-select: none;
    }

    .section-title {
      font-size: 11px; color: #888;
      text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
    }

    .toggle-btn {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: #aaa;
      background: none; border: 1px solid #e8e8e8; border-radius: 4px;
      padding: 2px 8px; cursor: pointer; font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .toggle-btn:hover { color: #555; border-color: #ccc; }
    .toggle-btn .arrow { display: inline-block; transition: transform 0.2s ease; font-style: normal; }
    .section.collapsed .toggle-btn .arrow { transform: rotate(-90deg); }

    .section-body {
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.2s ease;
      max-height: 1000px; opacity: 1;
    }
    .section.collapsed .section-body { max-height: 0; opacity: 0; }

    /* ── Info cards ── */
    .row { display: flex; flex-wrap: wrap; gap: 12px; }

    .card {
      background: #f9f9f9; border: 1px solid #e8e8e8;
      border-radius: 8px; padding: 12px 18px; flex: 1 1 180px;
    }

    .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .value { font-size: 15px; font-weight: 500; color: #111; word-break: break-all; }
    .value.empty { color: #bbb; font-weight: 400; font-style: italic; }

    /* ── Inputs card ── */
    .inputs-card { background: #f9f9f9; border: 1px solid #e8e8e8; border-radius: 8px; padding: 16px 18px; }
    .inputs-row { display: flex; flex-wrap: wrap; gap: 12px; }
    .input-group { display: flex; flex-direction: column; flex: 1 1 160px; gap: 4px; }
    .input-group label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; }
    .input-group input {
      padding: 8px 10px; border: 1px solid #e8e8e8; border-radius: 6px;
      font-size: 13px; color: #111; background: #fff; outline: none;
      transition: border-color 0.15s; font-family: inherit;
    }
    .input-group input:focus { border-color: #a5b4fc; }

    /* ── Small header buttons ── */
    .hdr-btn {
      display: inline-block; padding: 2px 8px; margin-left: 5px;
      border: 1px solid transparent; border-radius: 4px;
      font-size: 11px; font-weight: 500; cursor: pointer;
      font-family: inherit; vertical-align: middle;
      transition: opacity 0.15s;
    }
    .hdr-btn:hover { opacity: 0.75; }
    .btn-list      { background: #dbeafe; color: #1d4ed8; border-color: #bfdbfe; }
    .btn-create    { background: #dcfce7; color: #15803d; border-color: #bbf7d0; }
    .btn-detail    { background: #ede9fe; color: #6d28d9; border-color: #ddd6fe; }
    .btn-quickview { background: #ffedd5; color: #c2410c; border-color: #fed7aa; }

    /* ── BPEM Case Table Card ── */
    .table-card { background: #f9f9f9; border: 1px solid #e8e8e8; border-radius: 8px; padding: 16px 18px; }

    /* Status bar */
    .table-status { font-size: 12px; color: #888; margin-bottom: 10px; min-height: 18px; }
    .table-status.error   { color: #dc2626; }
    .table-status.success { color: #15803d; }
    .table-status.loading { color: #1d4ed8; }

    /* Table */
    .table-wrap { overflow-x: auto; border-radius: 6px; border: 1px solid #e8e8e8; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; }
    thead tr { background: #f1f5f9; }
    th {
      text-align: left; padding: 10px 14px;
      font-size: 11px; font-weight: 600; color: #555;
      text-transform: uppercase; letter-spacing: 0.06em;
      border-bottom: 1px solid #e8e8e8; white-space: nowrap;
    }
    td { padding: 10px 14px; color: #111; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge-open    { background: #dcfce7; color: #15803d; }
    .badge-closed  { background: #f1f5f9; color: #64748b; }
    .badge-pending { background: #ffedd5; color: #c2410c; }
    .badge-default { background: #ede9fe; color: #6d28d9; }

    .no-data { text-align: center; padding: 32px; color: #aaa; font-size: 13px; font-style: italic; }

    .refresh-btn {
      background: none; border: 1px solid #e8e8e8; border-radius: 4px;
      padding: 1px 6px; margin-left: 8px; cursor: pointer;
      font-size: 13px; color: #888; line-height: 1;
      transition: color 0.15s, border-color 0.15s, transform 0.3s;
      vertical-align: middle;
    }
    .refresh-btn:hover { color: #1d4ed8; border-color: #bfdbfe; }
    .refresh-btn.spinning { animation: spin 0.7s linear infinite; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #e8e8e8; border-top-color: #1d4ed8;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h2>Utilities Exception</h2>

    <!-- BPEM Case List (visible by default) -->
    <div class="section" id="section-cases">
      <div class="section-header" onclick="toggleSection('section-cases')">
        <span class="section-title">
          BPEM Case List
          <button class="refresh-btn" onclick="event.stopPropagation(); fetchCases();" title="Refresh cases">&#8635;</button>
          <button class="hdr-btn btn-list"      onclick="event.stopPropagation(); openList();">View Cases</button>
          <button class="hdr-btn btn-create"    onclick="event.stopPropagation(); openCreate();">Create Cases</button>
          <button class="hdr-btn btn-detail"    onclick="event.stopPropagation(); opendetail();">View Details</button>
          <button class="hdr-btn btn-quickview" onclick="event.stopPropagation(); openquickview();">Quick View</button>
        </span>
        <button class="toggle-btn"><i class="arrow">▾</i> <span class="toggle-label">Hide</span></button>
      </div>
      <div class="section-body">
        <div class="table-card">

          <!-- Hidden config: OData URL, client, credentials -->
          <div style="display:none">
            <input id="odata-url"    type="text"     value="/sap/opu/odata/sap/Z_C_BPEM_CASE_ODATA_CDS/Z_C_BPEM_CASE_ODATA/" />
            <input id="odata-client" type="text"     value="400" />
            <input id="odata-user"   type="text"     value="XYZ" />
            <input id="odata-pass"   type="password" value="ABC" />
          </div>

          <!-- Status -->
          <div class="table-status" id="table-status"></div>

          <!-- Table -->
          <div class="table-wrap">
            <table id="case-table">
              <thead>
                <tr>
                  <th>Case ID</th>
                  <th>Case Category</th>
                  <th>Case Description</th>
                  <th>Case Status</th>
                  <th>Related Contract Account</th>
                  <th>Related Premise</th>
                  <th>Team</th>
                  <th>Due Date</th>
                </tr>
              </thead>
              <tbody id="case-tbody">
                <tr><td colspan="8" class="no-data"><span class="spinner"></span> Loading cases…</td></tr>
              </tbody>
            </table>
          </div>

        </div>
      </div>
    </div>

    <!-- URL Parameters (hidden by default, moved below table) -->
    <div class="section collapsed" id="section-url">
      <div class="section-header" onclick="toggleSection('section-url')">
        <span class="section-title">URL Parameters</span>
        <button class="toggle-btn"><i class="arrow">▾</i> <span class="toggle-label">Show</span></button>
      </div>
      <div class="section-body">
        <div class="row" id="row"></div>
      </div>
    </div>

    <!-- Operation Parameters (hidden by default, moved below table) -->
    <div class="section collapsed" id="section-params">
      <div class="section-header" onclick="toggleSection('section-params')">
        <span class="section-title">Operation Parameters</span>
        <button class="toggle-btn"><i class="arrow">▾</i> <span class="toggle-label">Show</span></button>
      </div>
      <div class="section-body">
        <div class="inputs-card">
          <div class="inputs-row">
            <div class="input-group">
              <label for="input_opname">Operation Name</label>
              <input id="input_opname" type="text" placeholder="e.g. navigation" />
            </div>
            <div class="input-group">
              <label for="input_viewname">View Name</label>
              <input id="input_viewname" type="text" placeholder="e.g. list" />
            </div>
            <div class="input-group">
              <label for="input_routekey">Route Key</label>
              <input id="input_routekey" type="text" placeholder="e.g. /home" />
            </div>
            <div class="input-group">
              <label for="input_objkey">Object Key</label>
              <input id="input_objkey" type="text" placeholder="e.g. obj-123" />
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    /* ── Toggle ── */
    function toggleSection(id) {
      const sec = document.getElementById(id);
      const collapsed = sec.classList.toggle('collapsed');
      sec.querySelector('.toggle-label').textContent = collapsed ? 'Show' : 'Hide';
    }

    /* ── URL param cards ── */
    const fields = [
      { key: 'custid',      label: 'Customer ID' },
      { key: 'extcustid',   label: 'External Customer ID' },
      { key: 'cust_uuid',   label: 'Customer UUID' },
      { key: 'cust_name',   label: 'Customer Name' },
      { key: 'routing_key', label: 'Routing Key' },
    ];

    const params = new URLSearchParams(window.location.search);
    const row = document.getElementById('row');

    const routingKeyParam = params.get('routing_key');
    if (routingKeyParam) document.getElementById('input_routekey').value = routingKeyParam;

    fields.forEach(({ key, label }) => {
      const val = params.get(key);
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="label">${label}</div>
        <div class="value ${val ? '' : 'empty'}">${val ? val.replace(/</g,'&lt;') : 'Not provided'}</div>
      `;
      row.appendChild(card);
    });

    /* ── Auto-fetch on load if custid is present ── */
    const custidOnLoad = params.get('custid');
    if (custidOnLoad) {
      fetchCases();
    } else {
      document.getElementById('case-tbody').innerHTML =
        '<tr><td colspan="8" class="no-data">No custid parameter found in URL.</td></tr>';
      setStatus('error', 'No custid in URL — cannot load cases.');
    }

    /* ── Fetch BPEM Cases ── */
    async function fetchCases() {
      const baseUrl = document.getElementById('odata-url').value.trim();
      const client  = document.getElementById('odata-client').value.trim() || '400';
      const user    = document.getElementById('odata-user').value.trim();
      const pass    = document.getElementById('odata-pass').value;
      const custid  = params.get('custid') || '';
      const tbody   = document.getElementById('case-tbody');

      if (!custid) { setStatus('error', 'No custid URL parameter found. Cannot filter cases.'); return; }

      const filter = `BusinessPartnerNumber eq '${custid}'`;
      const url = `${baseUrl.replace(/\/$/, '')}/?sap-client=${encodeURIComponent(client)}&$filter=${encodeURIComponent(filter)}&$format=json`;

      setStatus('loading', 'Fetching cases from S4…');
      tbody.innerHTML = `<tr><td colspan="8" class="no-data"><span class="spinner"></span> Loading…</td></tr>`;
      document.querySelector('.refresh-btn')?.classList.add('spinning');

      try {
        const credentials = btoa(`${user}:${pass}`);
        const response = await fetch(url, {
          method: 'GET',
          headers: {
            'Authorization': `Basic ${credentials}`,
            'Accept': 'application/json',
          }
        });

        if (!response.ok) throw new Error(`HTTP ${response.status} – ${response.statusText}`);

        const data = await response.json();
        const results = data?.d?.results || data?.value || [];

        if (results.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8" class="no-data">No cases found for this customer.</td></tr>`;
          setStatus('success', 'Fetch complete — 0 records.');
          return;
        }

        tbody.innerHTML = results.map(c => `
          <tr>
            <td>${esc(c.BPEMCase)}</td>
            <td>${esc(c.BPEMCaseTypeName)}</td>
            <td>${esc(c.BPEMCaseCategoryName)}</td>
            <td>${statusBadge(c.BPEMCaseStatusName)}</td>
            <td>${esc(c.BPEMCaseMainObject || '—')}</td>
            <td>${esc(c.Premise || '—')}</td>
            <td>${esc(c.Team || '—')}</td>
            <td>${esc(c.Duedate_T || '—')}</td>
          </tr>
        `).join('');

        setStatus('success', `Fetch complete — ${results.length} record(s) returned.`);
        document.querySelector('.refresh-btn')?.classList.remove('spinning');

      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="8" class="no-data">Failed to load data. Check URL, credentials, or CORS policy.</td></tr>`;
        setStatus('error', `Error: ${err.message}`);
        document.querySelector('.refresh-btn')?.classList.remove('spinning');
        console.error(err);
      }
    }

    function setStatus(type, msg) {
      const el = document.getElementById('table-status');
      el.className = `table-status ${type}`;
      el.innerHTML = type === 'loading'
        ? `<span class="spinner"></span>${msg}`
        : msg;
    }

    function statusBadge(status) {
      if (!status) return '<span class="badge badge-default">—</span>';
      const s = status.toLowerCase();
      let cls = 'badge-default';
      if (s.includes('open'))  cls = 'badge-open';
      else if (s.includes('clos')) cls = 'badge-closed';
      else if (s.includes('pend') || s.includes('new')) cls = 'badge-pending';
      return `<span class="badge ${cls}">${esc(status)}</span>`;
    }

    function esc(v) {
      return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* ── Navigation functions ── */
    function validate_input() {
      const route = document.getElementById("input_routekey").value;
      if (!route) throw new Error("Routing key is required.");
    }

    function openList() {
      oper = "navigation";
      document.getElementById("input_opname").value = oper;
      view = "list";
      document.getElementById("input_viewname").value = view;
      route = document.getElementById("input_routekey").value;
      try { validate_input(); } catch (e) { console.error(e.message); }
      window.parent.postMessage({ operation: oper, params: { routingKey: route, viewType: view } }, "*");
    }

    function openCreate() {
      oper = "navigation";
      document.getElementById("input_opname").value = oper;
      view = "quickcreate";
      document.getElementById("input_viewname").value = view;
      route = document.getElementById("input_routekey").value;
      window.parent.postMessage({ operation: oper, params: { routingKey: route, viewType: view } }, "*");
    }

    function opendetail() {
      oper = "navigation";
      document.getElementById("input_opname").value = oper;
      view = "details";
      document.getElementById("input_viewname").value = view;
      route = document.getElementById("input_routekey").value;
      objkey = document.getElementById("input_objkey").value;
      window.parent.postMessage({ operation: oper, params: { objectKey: objkey, routingKey: route, viewType: view } }, "*");
    }

    function openquickview() {
      oper = "navigation";
      document.getElementById("input_opname").value = oper;
      view = "quickview";
      document.getElementById("input_viewname").value = view;
      objkey = document.getElementById("input_objkey").value;
      route = document.getElementById("input_routekey").value;
      window.parent.postMessage({ operation: oper, params: { objectKey: objkey, routingKey: route, viewType: view } }, "*");
    }
  </script>
</body>
</html>
