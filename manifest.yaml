---
applications:
- name: ext-customer-info # app name on BTP
  memory: 128M            # RAM allocated
  buildpacks:             # tells BTP it's a Node.js app
    - nodejs_buildpack
  command: node proxy.js  # command to start the server
  routes:
    - route: ext-customer-info.cfapps.us21.hana.ondemand.com
  env: 
    OPTIMIZE_MEMORY: "true"